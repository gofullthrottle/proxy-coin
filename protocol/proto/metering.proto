syntax = "proto3";
package proxycoin.protocol.v1;
option go_package = "github.com/gofullthrottle/proxy-coin/backend/pkg/protocol";
option java_package = "com.proxycoin.app.protocol";
option java_outer_classname = "MeteringProto";

message MeteringEvent {
  string request_id = 1;
  string node_id = 2;
  string customer_id = 3;
  int64 bytes_in = 4;
  int64 bytes_out = 5;
  int32 latency_ms = 6;
  int32 status_code = 7;
  bool success = 8;
  int64 timestamp = 9;
}

message MeteringReport {
  string node_id = 1;
  repeated MeteringEvent events = 2;
  int64 report_timestamp = 3;
}

message MeteringSummary {
  string node_id = 1;
  int64 total_bytes_in = 2;
  int64 total_bytes_out = 3;
  int32 total_requests = 4;
  int32 successful_requests = 5;
  int32 avg_latency_ms = 6;
  int64 period_start = 7;
  int64 period_end = 8;
}
