syntax = "proto3";
package proxycoin.protocol.v1;
option go_package = "github.com/gofullthrottle/proxy-coin/backend/pkg/protocol";
option java_package = "com.proxycoin.app.protocol";
option java_outer_classname = "ProxyProto";

import "node.proto";

enum ProxyMethod {
  PROXY_METHOD_UNSPECIFIED = 0;
  GET = 1;
  POST = 2;
  PUT = 3;
  DELETE = 4;
  PATCH = 5;
  HEAD = 6;
  OPTIONS = 7;
  CONNECT = 8;
}

message Header {
  string key = 1;
  string value = 2;
}

message ProxyRequest {
  string request_id = 1;
  ProxyMethod method = 2;
  string url = 3;
  repeated Header headers = 4;
  bytes body = 5;
  int32 timeout_ms = 6;
}

message ProxyResponseStart {
  string request_id = 1;
  int32 status_code = 2;
  repeated Header headers = 3;
  int64 content_length = 4;
}

message ProxyResponseChunk {
  string request_id = 1;
  int32 chunk_index = 2;
  bytes data = 3;
}

message ProxyResponseEnd {
  string request_id = 1;
  int64 total_bytes = 2;
  int32 latency_ms = 3;
  bool success = 4;
  string error_message = 5;
}

// Wrapper message for WebSocket framing
message WebSocketMessage {
  oneof payload {
    RegisterRequest register_request = 1;
    RegisterResponse register_response = 2;
    Heartbeat heartbeat = 3;
    HeartbeatAck heartbeat_ack = 4;
    ConfigUpdate config_update = 5;
    EarningsUpdate earnings_update = 6;
    ProxyRequest proxy_request = 7;
    ProxyResponseStart proxy_response_start = 8;
    ProxyResponseChunk proxy_response_chunk = 9;
    ProxyResponseEnd proxy_response_end = 10;
  }
}
