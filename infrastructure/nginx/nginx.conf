# Proxy Coin API Gateway — NGINX configuration
# Upstream backends running as Docker Swarm services on the same overlay network.

worker_processes      auto;
worker_rlimit_nofile  65535;
error_log             /var/log/nginx/error.log warn;
pid                   /var/run/nginx.pid;

events {
    worker_connections  4096;
    use                 epoll;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # -------------------------------------------------------------------------
    # Logging
    # -------------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time '
                    'X-Request-ID=$http_x_request_id';

    access_log /var/log/nginx/access.log main;

    # -------------------------------------------------------------------------
    # Global performance
    # -------------------------------------------------------------------------
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  75s;
    keepalive_requests 1000;

    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types        text/plain text/css application/json application/javascript
                      application/x-javascript text/xml application/xml
                      application/xml+rss text/javascript;

    # -------------------------------------------------------------------------
    # Rate limiting zones (shared memory)
    # -------------------------------------------------------------------------
    # Gateway-level protection: 100 req/s per IP (before per-customer Redis limits).
    limit_req_zone  $binary_remote_addr zone=api_global:16m rate=100r/s;
    limit_req_zone  $http_x_api_key     zone=api_key:32m  rate=50r/s;
    limit_req_status 429;

    # -------------------------------------------------------------------------
    # Upstream backends
    # -------------------------------------------------------------------------
    upstream orchestrator {
        least_conn;
        server orchestrator:8080 max_fails=3 fail_timeout=30s;
        keepalive 64;
    }

    upstream api {
        least_conn;
        server api:8081 max_fails=3 fail_timeout=30s;
        keepalive 64;
    }

    upstream metering {
        least_conn;
        server metering:8082 max_fails=3 fail_timeout=30s;
        keepalive 64;
    }

    # -------------------------------------------------------------------------
    # HTTPS redirect: HTTP → HTTPS
    # -------------------------------------------------------------------------
    server {
        listen      80;
        server_name api.proxycoin.io;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # -------------------------------------------------------------------------
    # Main HTTPS server — api.proxycoin.io
    # -------------------------------------------------------------------------
    server {
        listen      443 ssl http2;
        server_name api.proxycoin.io;

        # ----- TLS -----
        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_dhparam         /etc/nginx/ssl/dhparam.pem;

        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       1d;
        ssl_session_tickets       off;
        ssl_stapling              on;
        ssl_stapling_verify       on;

        # HSTS — 2 years; includeSubDomains; preload
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # ----- Security headers -----
        add_header X-Frame-Options          DENY            always;
        add_header X-Content-Type-Options   nosniff         always;
        add_header X-XSS-Protection         "1; mode=block" always;
        add_header Referrer-Policy          "no-referrer"   always;
        add_header Permissions-Policy       "interest-cohort=()" always;

        # ----- Request ID propagation -----
        # Generate a unique request ID if the client didn't provide one.
        set $req_id $request_id;
        add_header X-Request-ID $req_id always;
        proxy_set_header X-Request-ID $req_id;

        # ----- CORS -----
        # Allowed origins (adjust for production front-end domains).
        map $http_origin $cors_origin {
            default          "";
            "~^https://app\.proxycoin\.io(:\d+)?$" $http_origin;
            "~^https://dash\.proxycoin\.io(:\d+)?$" $http_origin;
        }

        add_header Access-Control-Allow-Origin      $cors_origin  always;
        add_header Access-Control-Allow-Methods     "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers     "Authorization, Content-Type, X-API-Key, X-Request-ID" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Max-Age           86400 always;

        # Preflight short-circuit.
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # ----- Size limits -----
        client_max_body_size 10m;

        # ----- Global rate limit -----
        limit_req zone=api_global burst=200 nodelay;

        # ===================================================================
        # WebSocket — node connections (orchestrator handles /ws)
        # ===================================================================
        location /ws {
            proxy_pass         http://orchestrator;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

            # Long-lived connections
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
            proxy_connect_timeout 10s;

            # No rate limiting on WebSocket upgrades (already authenticated by orchestrator).
        }

        # ===================================================================
        # Customer API — /v1/auth, /v1/proxy, /v1/rewards, /v1/usage
        # ===================================================================
        location /v1/ {
            limit_req zone=api_key burst=100 nodelay;

            proxy_pass         http://api;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout 5s;
            proxy_read_timeout    30s;
            proxy_send_timeout    30s;

            proxy_buffering    off;
        }

        # ===================================================================
        # Metering (internal — not customer-facing, health check only)
        # ===================================================================
        location /internal/health {
            # Restrict to internal/VPN ranges only.
            allow  10.0.0.0/8;
            allow  172.16.0.0/12;
            allow  192.168.0.0/16;
            allow  100.64.0.0/10;   # Tailscale CGNAT range
            deny   all;

            proxy_pass         http://metering/health;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
        }

        # ===================================================================
        # Health / ready endpoints (public; no rate limit)
        # ===================================================================
        location = /health {
            proxy_pass         http://api/health;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            access_log off;
        }

        location = /ready {
            proxy_pass         http://api/ready;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            access_log off;
        }

        # ===================================================================
        # Block all other paths
        # ===================================================================
        location / {
            return 404 '{"error":"not found"}';
            add_header Content-Type application/json always;
        }
    }
}
