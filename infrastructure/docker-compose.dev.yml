services:
  postgres:
    image: postgres:16-alpine
    container_name: proxycoin-postgres
    environment:
      POSTGRES_DB: proxycoin
      POSTGRES_USER: proxycoin
      POSTGRES_PASSWORD: proxycoin_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proxycoin -d proxycoin"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: proxycoin-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

volumes:
  pgdata:
  redisdata:
